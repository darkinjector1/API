backend:
  name: github
  repo: YOUR-USERNAME/YOUR-REPO

media_folder: "uploads"

collections:
  - name: "posts"
    label: "Posts"
    folder: "posts"
    create: true
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Date", name: "date", widget: "datetime"}
      - {label: "Body", name: "body", widget: "markdown"}
